<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAEVUS • Metaphysical Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js for rendering PDF previews -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Zeyada&display=swap');
      
      :root {
        --bg: #111113;
        --ink: #F8F7F4;
        --accent: #E60026;
      }
      
      body {
        font-family: 'Space Mono', monospace;
        background-color: var(--bg);
        color: var(--ink);
      }
      
      /* Technical Dot Grid Background */
      .bg-dot-grid {
        background-size: 40px 40px;
        background-image: radial-gradient(circle, rgba(230, 0, 38, 0.1) 1px, transparent 1px);
      }

      /* Helper classes for fonts */
      .font-syne {
        font-family: 'Syne', sans-serif;
      }
      .font-mono-custom {
        font-family: 'Space Mono', monospace;
      }
      .font-zeyada {
        font-family: 'Zeyada', cursive;
      }

      /* Smooth scrolling for the whole app */
      html {
        scroll-behavior: smooth;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
